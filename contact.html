<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — LACHIN GULUYEV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Tenor+Sans&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="header">
    <nav class="nav">
      <a href="index.html" class="nav-logo">LACHIN GULUYEV</a>
      <button class="nav-toggle" aria-label="Toggle menu">
        <span class="toggle-text">Menu</span>
      </button>
      <ul class="nav-links">
        <li><a href="index.html">Gallery</a></li>
        <li><a href="real-time-app.html">Real-Time App</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">off</button>
    </nav>
  </header>

  <main class="main">
    <div class="page-wrap">

      <div class="contact-layout">

        <!-- LEFT: Map -->
        <div class="contact-map-col">
          <p class="contact-col-label">Location: <span id="locationName">Munich</span></p>
          <div class="map-tabs">
            <button class="map-tab active" data-city="Munich"
              data-src="https://maps.google.com/maps?q=48.1888519,11.4669716&output=embed&z=18">Munich</button>
            <button class="map-tab" data-city="Baku"
              data-src="https://maps.google.com/maps?q=40.3751127,49.8522095&output=embed&z=17">Baku</button>
            <button class="map-tab" data-city="USA"
              data-src="https://maps.google.com/maps?q=41.8089191,-88.0111746&output=embed&z=13">USA</button>
          </div>
          <div class="map-frame">
            <iframe id="mapFrame"
              src="https://maps.google.com/maps?q=48.1888519,11.4669716&output=embed&z=18"
              allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
          </div>
        </div>

        <!-- RIGHT: Form -->
        <div class="contact-form-col">
          <p class="contact-col-label">Contact: studio@lachinguluyev.com</p>
          <form id="contactForm" enctype="multipart/form-data" novalidate>
            <input type="hidden" name="_captcha" value="false" />
            <input type="hidden" name="_subject" value="New inquiry from portfolio" />
            <input type="hidden" name="_template" value="table" />

            <div class="form-row">
              <label for="fname">Name</label>
              <input type="text" id="fname" name="name" autocomplete="name" required />
            </div>

            <div class="form-row">
              <label for="femail">Mail</label>
              <input type="email" id="femail" name="email" autocomplete="email" required />
            </div>

            <div class="form-row">
              <label for="fsubject">Subject</label>
              <input type="text" id="fsubject" name="subject" required />
            </div>

            <div class="form-row">
              <label>Files</label>
              <label class="form-file-wrap" for="contactFiles">
                <span class="form-file-btn">Choose files</span>
                <span class="form-file-name" id="fileName">No file chosen</span>
                <span class="form-file-hint">Max 100 MB</span>
              </label>
              <input type="file" id="contactFiles" name="attachment" multiple />
            </div>

            <div class="form-row">
              <label for="fmessage">Description or Message</label>
              <textarea id="fmessage" name="message" rows="5" required></textarea>
            </div>

            <p id="formStatus" class="form-status"></p>
            <button type="submit" class="btn-send">Send</button>
          </form>
        </div>

      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <span class="footer-copy">© 2026 Lachin Guluyev</span>
      <div class="footer-social">
        <a href="https://www.instagram.com/lachinguluyev" target="_blank" rel="noopener">Instagram</a>
        <a href="https://www.linkedin.com/in/lachinguluyev/" target="_blank" rel="noopener">LinkedIn</a>
        <a href="https://www.behance.net/lachinguluyev" target="_blank" rel="noopener">Behance</a>
        <a href="https://www.youtube.com/@lachinguluyev" target="_blank" rel="noopener">Youtube</a>
      </div>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script>
    /* ── Map tabs ── */
    document.querySelectorAll('.map-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.map-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('mapFrame').src = btn.dataset.src;
        document.getElementById('locationName').textContent = btn.dataset.city;
      });
    });

    /* ── File input ── */
    const contactFiles = document.getElementById('contactFiles');
    const fileNameEl   = document.getElementById('fileName');

    contactFiles.addEventListener('change', () => {
      const files = Array.from(contactFiles.files);
      const totalSize = files.reduce((s, f) => s + f.size, 0);

      if (totalSize > 100 * 1024 * 1024) {
        fileNameEl.textContent = 'Exceeds 100 MB limit';
        fileNameEl.classList.add('form-file-error');
        contactFiles.value = '';
        return;
      }
      fileNameEl.classList.remove('form-file-error');
      fileNameEl.textContent = files.length === 0 ? 'No file chosen'
                             : files.length === 1 ? files[0].name
                             : files.length + ' files selected';
    });

    /* ── Form submit ── */
    const contactForm = document.getElementById('contactForm');
    const formStatus  = document.getElementById('formStatus');

    contactForm.addEventListener('submit', async e => {
      e.preventDefault();
      const btn = contactForm.querySelector('.btn-send');

      btn.disabled = true;
      btn.textContent = 'Sending…';
      formStatus.className = 'form-status';
      formStatus.textContent = '';

      try {
        const res = await fetch('https://formsubmit.co/ajax/studio@lachinguluyev.com', {
          method: 'POST',
          headers: { 'Accept': 'application/json' },
          body: new FormData(contactForm)
        });

        if (res.ok) {
          formStatus.textContent = 'Message sent successfully.';
          formStatus.classList.add('form-status--ok');
          contactForm.reset();
          fileNameEl.textContent = 'No file chosen';
          fileNameEl.classList.remove('form-file-error');
        } else {
          throw new Error();
        }
      } catch {
        formStatus.textContent = 'Something went wrong. Please try again.';
        formStatus.classList.add('form-status--err');
      }

      btn.disabled = false;
      btn.textContent = 'Send';
    });
  </script>
</body>
</html>
