  <header class="header">
    <nav class="nav">
      <a href="index.html" class="nav-logo">LACHIN GULUYEV</a>

  <main class="main">
    <div class="page-wrap">
      <p class="page-heading">Real-Time App</p>

      <!-- YouTube Video -->
      <div class="rta-video-wrap">
        <div class="rta-video-ratio">
          <iframe
            src="https://www.youtube.com/embed/pf0lx6K9D1w"
            title="YouTube video player"
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin"
            allowfullscreen></iframe>
        </div>
      </div>

      <!-- Screenshot Grid -->
      <div class="rta-grid">
        <div class="rta-img-wrap">
          <img src="assets/images/REALTIME1.jpg" alt="Real-Time App — Street View" />
        </div>
        <div class="rta-img-wrap">
          <img src="assets/images/REALTIME2.jpg" alt="Real-Time App — Surroundings" />
        </div>
        <div class="rta-img-wrap">
          <img src="assets/images/REALTIME3.jpg" alt="Real-Time App — Interior" />
        </div>
      </div>

      <!-- 360 Virtual -->
      <p class="rta-section-title">360 Virtual</p>

      <div class="rta-kuula-list">
        <iframe
          src="https://kuula.co/share/collection/7F886?logo=1&info=1&fs=1&vr=0&sd=1&thumbs=1"
          width="100%" height="640"
          allow="xr-spatial-tracking; gyroscope; accelerometer"
          allowfullscreen scrolling="no" frameborder="0"></iframe>

        <iframe
          src="https://kuula.co/share/collection/7qjYz?logo=1&info=1&fs=1&vr=0&sd=1&thumbs=1"
          width="100%" height="640"
          allow="xr-spatial-tracking; gyroscope; accelerometer"
          allowfullscreen scrolling="no" frameborder="0"></iframe>

        <iframe
          src="https://kuula.co/share/collection/71RBv?logo=1&info=1&fs=1&vr=0&sd=1&thumbs=1"
          width="100%" height="640"
          allow="xr-spatial-tracking; gyroscope; accelerometer"
          allowfullscreen scrolling="no" frameborder="0"></iframe>
      </div>

    </div>
  </main>
