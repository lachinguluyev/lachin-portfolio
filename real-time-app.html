  <script src="js/main.js"></script>
  <script>
    const rtaLb     = document.getElementById('rtaLb');
    const rtaLbInner = document.getElementById('rtaLbInner');
    const rtaLbClose = document.getElementById('rtaLbClose');

    function openRtaLb(html) {
      rtaLbInner.innerHTML = html;
      rtaLb.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeRtaLb() {
      rtaLb.classList.remove('open');
      rtaLbInner.innerHTML = '';
      document.body.style.overflow = '';
    }

    document.querySelectorAll('.rta-card').forEach(card => {
      card.addEventListener('click', () => {
        const yt  = card.dataset.yt;
        const img = card.dataset.img;
        if (yt) {
          openRtaLb(`<iframe src="https://www.youtube.com/embed/${yt}?autoplay=1&rel=0" allow="autoplay; fullscreen" allowfullscreen></iframe>`);
        } else if (img) {
          openRtaLb(`<img src="${img}" alt="" />`);
        }
      });
    });

    rtaLb.addEventListener('click', e => { if (e.target === rtaLb) closeRtaLb(); });
    rtaLbClose.addEventListener('click', closeRtaLb);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeRtaLb(); });
  </script>

</body>
